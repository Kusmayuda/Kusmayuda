<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 220" width="100%" height="100%">
  <defs>
    <filter id="cg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b" />
      <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="shadowGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b" />
    </filter>
  </defs>

  <style>
    <![CDATA[
    .fo { font-family: 'Outfit', -apple-system, sans-serif; }
    .fc { font-family: 'Fira Code', 'Consolas', monospace; }

    /* 3D Platform Float */
    @keyframes platFloat1 { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes platFloat2 { 0%, 100% { transform: translateY(-3px); } 50% { transform: translateY(3px); } }
    @keyframes platFloat3 { 0%, 100% { transform: translateY(2px); } 50% { transform: translateY(-7px); } }
    .pf1 { animation: platFloat1 4s ease-in-out infinite; }
    .pf2 { animation: platFloat2 5s ease-in-out infinite; }
    .pf3 { animation: platFloat3 4.5s ease-in-out infinite; }

    /* Orbital Ring Spin */
    @keyframes orbitSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .orbit-ring { animation: orbitSpin 6s linear infinite; transform-origin: center; }

    /* Border Scan Line (moving along the perimeter) */
    @keyframes borderScan {
      0% { stroke-dashoffset: 1000; }
      100% { stroke-dashoffset: 0; }
    }
    .border-scan {
      stroke-dasharray: 60 940;
      stroke-dashoffset: 1000;
      animation: borderScan 10s linear infinite;
    }

    /* Pulsing glow under platforms */
    @keyframes underGlow {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.35; }
    }
    .under-glow { animation: underGlow 3s ease-in-out infinite; }
    ]]>
  </style>

  <!-- ===== PANEL 1: FRONTEND ===== -->
  <g transform="translate(15, 10)">
    <!-- Panel Background -->
    <rect width="370" height="195" rx="16" fill="#020205" stroke="#1f2937" stroke-width="1" />
    <!-- Animated Border Scan -->
    <rect width="370" height="195" rx="16" fill="none" stroke="#06b6d4" stroke-width="1.5" class="border-scan" />

    <!-- Corner accents -->
    <path d="M 8,18 L 8,6 L 20,6" stroke="#06b6d4" stroke-width="1.2" fill="none" opacity="0.5" />
    <path d="M 362,177 L 362,189 L 350,189" stroke="#06b6d4" stroke-width="1.2" fill="none" opacity="0.5" />

    <!-- Title -->
    <text x="28" y="32" fill="#374151" class="fc" font-size="9" font-weight="700" letter-spacing="2">01 // FRONTEND_CORE</text>

    <!-- React on 3D Floating Platform -->
    <g class="pf1" transform="translate(50, 120)">
      <!-- Platform shadow glow -->
      <ellipse cx="0" cy="25" rx="22" ry="6" fill="#06b6d4" class="under-glow" filter="url(#shadowGlow)" />
      <!-- 3D Isometric platform -->
      <polygon points="-22,12 0,22 22,12 0,2" fill="#0a0a1a" stroke="#1e293b" stroke-width="0.8" />
      <!-- React logo -->
      <g filter="url(#cg)">
        <ellipse rx="14" ry="5" fill="none" stroke="#00d8ff" stroke-width="1.2" />
        <ellipse rx="14" ry="5" fill="none" stroke="#00d8ff" stroke-width="1.2" transform="rotate(60)" />
        <ellipse rx="14" ry="5" fill="none" stroke="#00d8ff" stroke-width="1.2" transform="rotate(120)" />
        <circle r="2.5" fill="#00d8ff" />
      </g>
      <!-- Orbital ring -->
      <g class="orbit-ring">
        <circle r="22" fill="none" stroke="#00d8ff" stroke-width="0.6" stroke-dasharray="4 12" opacity="0.3" />
      </g>
      <text x="0" y="38" fill="#4b5563" class="fc" font-size="8" text-anchor="middle">REACT</text>
    </g>

    <!-- JavaScript on Platform -->
    <g class="pf2" transform="translate(130, 120)">
      <ellipse cx="0" cy="25" rx="18" ry="5" fill="#eab308" class="under-glow" filter="url(#shadowGlow)" />
      <polygon points="-18,12 0,20 18,12 0,4" fill="#0a0a1a" stroke="#1e293b" stroke-width="0.8" />
      <rect x="-12" y="-12" width="24" height="24" rx="4" fill="#f7df1e" />
      <text x="2" y="8" fill="#000" class="fo" font-weight="800" font-size="11" text-anchor="middle">JS</text>
      <text x="0" y="36" fill="#4b5563" class="fc" font-size="8" text-anchor="middle">ES6+</text>
    </g>

    <!-- TypeScript on Platform -->
    <g class="pf3" transform="translate(205, 120)">
      <ellipse cx="0" cy="25" rx="18" ry="5" fill="#3b82f6" class="under-glow" filter="url(#shadowGlow)" />
      <polygon points="-18,12 0,20 18,12 0,4" fill="#0a0a1a" stroke="#1e293b" stroke-width="0.8" />
      <rect x="-12" y="-12" width="24" height="24" rx="4" fill="#007acc" />
      <text x="2" y="8" fill="#fff" class="fo" font-weight="800" font-size="11" text-anchor="middle">TS</text>
      <text x="0" y="36" fill="#4b5563" class="fc" font-size="8" text-anchor="middle">TYPED</text>
    </g>

    <!-- Next.js on Platform -->
    <g class="pf1" transform="translate(280, 120)" style="animation-delay: -2s;">
      <ellipse cx="0" cy="25" rx="18" ry="5" fill="#e2e8f0" class="under-glow" filter="url(#shadowGlow)" />
      <polygon points="-18,12 0,20 18,12 0,4" fill="#0a0a1a" stroke="#1e293b" stroke-width="0.8" />
      <circle r="13" fill="#000" stroke="#f8fafc" stroke-width="1.2" />
      <text x="0" y="5" fill="#fff" class="fo" font-weight="800" font-size="14" text-anchor="middle">N</text>
      <text x="0" y="36" fill="#4b5563" class="fc" font-size="8" text-anchor="middle">NEXTJS</text>
    </g>

    <!-- Tailwind on Platform -->
    <g class="pf2" transform="translate(340, 120)" style="animation-delay: -1s;">
      <ellipse cx="0" cy="25" rx="18" ry="5" fill="#06b6d4" class="under-glow" filter="url(#shadowGlow)" />
      <polygon points="-18,12 0,20 18,12 0,4" fill="#0a0a1a" stroke="#1e293b" stroke-width="0.8" />
      <g filter="url(#cg)">
        <path d="M -12,0 C -6,-10 0,-10 6,0 C 12,10 18,10 24,0" fill="none" stroke="#38bdf8" stroke-width="2" transform="translate(-6, 0)" />
      </g>
      <text x="0" y="36" fill="#4b5563" class="fc" font-size="8" text-anchor="middle">TAILWIND</text>
    </g>
  </g>

  <!-- ===== PANEL 2: BACKEND ===== -->
  <g transform="translate(400, 10)">
    <rect width="210" height="195" rx="16" fill="#020205" stroke="#1f2937" stroke-width="1" />
    <rect width="210" height="195" rx="16" fill="none" stroke="#a855f7" stroke-width="1.5" class="border-scan" style="animation-delay: -3s;" />

    <path d="M 8,18 L 8,6 L 20,6" stroke="#a855f7" stroke-width="1.2" fill="none" opacity="0.5" />
    <path d="M 202,177 L 202,189 L 190,189" stroke="#a855f7" stroke-width="1.2" fill="none" opacity="0.5" />

    <text x="28" y="32" fill="#374151" class="fc" font-size="9" font-weight="700" letter-spacing="2">02 // BACKEND_SRV</text>

    <!-- Node.js on Platform -->
    <g class="pf3" transform="translate(70, 120)">
      <ellipse cx="0" cy="25" rx="20" ry="5" fill="#22c55e" class="under-glow" filter="url(#shadowGlow)" />
      <polygon points="-20,12 0,22 20,12 0,2" fill="#0a0a1a" stroke="#1e293b" stroke-width="0.8" />
      <g filter="url(#cg)">
        <polygon points="0,-14 12,-7 12,7 0,14 -12,7 -12,-7" fill="none" stroke="#22c55e" stroke-width="1.8" />
        <circle r="3.5" fill="#22c55e" />
      </g>
      <text x="0" y="38" fill="#4b5563" class="fc" font-size="8" text-anchor="middle">NODEJS</text>
    </g>

    <!-- Express on Platform -->
    <g class="pf1" transform="translate(145, 120)">
      <ellipse cx="0" cy="25" rx="18" ry="5" fill="#6366f1" class="under-glow" filter="url(#shadowGlow)" />
      <polygon points="-18,12 0,20 18,12 0,4" fill="#0a0a1a" stroke="#1e293b" stroke-width="0.8" />
      <circle r="13" fill="#111827" stroke="#334155" stroke-width="1.2" />
      <text x="0" y="5" fill="#38bdf8" class="fc" font-weight="700" font-size="10" text-anchor="middle">ex</text>
      <text x="0" y="36" fill="#4b5563" class="fc" font-size="8" text-anchor="middle">EXPRESS</text>
    </g>
  </g>

  <!-- ===== PANEL 3: INFRA & TOOLS ===== -->
  <g transform="translate(625, 10)">
    <rect width="210" height="195" rx="16" fill="#020205" stroke="#1f2937" stroke-width="1" />
    <rect width="210" height="195" rx="16" fill="none" stroke="#ec4899" stroke-width="1.5" class="border-scan" style="animation-delay: -6s;" />

    <path d="M 8,18 L 8,6 L 20,6" stroke="#ec4899" stroke-width="1.2" fill="none" opacity="0.5" />
    <path d="M 202,177 L 202,189 L 190,189" stroke="#ec4899" stroke-width="1.2" fill="none" opacity="0.5" />

    <text x="28" y="32" fill="#374151" class="fc" font-size="9" font-weight="700" letter-spacing="2">03 // INFRA_TOOLS</text>

    <!-- PostgreSQL on Platform -->
    <g class="pf2" transform="translate(45, 120)">
      <ellipse cx="0" cy="25" rx="18" ry="5" fill="#6366f1" class="under-glow" filter="url(#shadowGlow)" />
      <polygon points="-18,12 0,20 18,12 0,4" fill="#0a0a1a" stroke="#1e293b" stroke-width="0.8" />
      <circle r="13" fill="#316192" stroke="#4f46e5" stroke-width="1.2" />
      <text x="0" y="5" fill="#fff" class="fo" font-weight="800" font-size="10" text-anchor="middle">PG</text>
      <text x="0" y="36" fill="#4b5563" class="fc" font-size="8" text-anchor="middle">POSTGRES</text>
    </g>

    <!-- Git on Platform -->
    <g class="pf3" transform="translate(110, 120)" style="animation-delay: -1s;">
      <ellipse cx="0" cy="25" rx="18" ry="5" fill="#f05033" class="under-glow" filter="url(#shadowGlow)" />
      <polygon points="-18,12 0,20 18,12 0,4" fill="#0a0a1a" stroke="#1e293b" stroke-width="0.8" />
      <rect x="-10" y="-10" width="20" height="20" fill="none" stroke="#f05033" stroke-width="1.8" rx="2" transform="rotate(45)" />
      <circle cx="-3" cy="3" r="2.2" fill="#f05033" />
      <circle cx="3" cy="-3" r="2.2" fill="#f05033" />
      <line x1="-3" y1="3" x2="3" y2="-3" stroke="#f05033" stroke-width="1.5" />
      <text x="0" y="36" fill="#4b5563" class="fc" font-size="8" text-anchor="middle">GIT</text>
    </g>

    <!-- Figma on Platform -->
    <g class="pf1" transform="translate(170, 120)" style="animation-delay: -3s;">
      <ellipse cx="0" cy="25" rx="18" ry="5" fill="#a259ff" class="under-glow" filter="url(#shadowGlow)" />
      <polygon points="-18,12 0,20 18,12 0,4" fill="#0a0a1a" stroke="#1e293b" stroke-width="0.8" />
      <circle cx="-4" cy="-7" r="4.5" fill="#f24e1e" />
      <circle cx="4" cy="-7" r="4.5" fill="#ff7262" />
      <circle cx="-4" cy="2" r="4.5" fill="#a259ff" />
      <circle cx="4" cy="2" r="4.5" fill="#1abc9c" />
      <circle cx="-4" cy="11" r="4.5" fill="#0acf83" />
      <text x="0" y="38" fill="#4b5563" class="fc" font-size="8" text-anchor="middle">FIGMA</text>
    </g>
  </g>
</svg>
