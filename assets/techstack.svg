<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 120" width="100%" height="100%">
  <defs>
    <filter id="g">
      <feGaussianBlur stdDeviation="3" result="b" />
      <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="halo">
      <feGaussianBlur stdDeviation="8" result="b" />
    </filter>
  </defs>

  <style>
    <![CDATA[
    .fo { font-family: 'Outfit', -apple-system, sans-serif; }
    .fc { font-family: 'Fira Code', 'Consolas', monospace; }

    @keyframes float1 { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    @keyframes float2 { 0%, 100% { transform: translateY(-2px); } 50% { transform: translateY(2px); } }
    .f1 { animation: float1 4s ease-in-out infinite; }
    .f2 { animation: float2 4.5s ease-in-out infinite; }

    @keyframes orbitSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .orbit { animation: orbitSpin 8s linear infinite; transform-origin: 0 0; }
    ]]>
  </style>

  <!-- Background -->
  <rect width="850" height="120" rx="14" fill="#020205" stroke="#111827" stroke-width="1" />

  <!-- === ICONS ROW === -->

  <!-- React -->
  <g class="f1" transform="translate(65, 50)">
    <circle r="12" fill="#06b6d4" opacity="0.08" filter="url(#halo)" />
    <g filter="url(#g)">
      <ellipse rx="13" ry="5" fill="none" stroke="#00d8ff" stroke-width="1.2" />
      <ellipse rx="13" ry="5" fill="none" stroke="#00d8ff" stroke-width="1.2" transform="rotate(60)" />
      <ellipse rx="13" ry="5" fill="none" stroke="#00d8ff" stroke-width="1.2" transform="rotate(120)" />
      <circle r="2" fill="#00d8ff" />
    </g>
    <!-- Orbit ring -->
    <g class="orbit"><circle r="20" fill="none" stroke="#00d8ff" stroke-width="0.4" stroke-dasharray="3 15" opacity="0.3" /></g>
    <text x="0" y="38" fill="#4b5563" class="fc" font-size="8" text-anchor="middle">React</text>
  </g>

  <!-- JavaScript -->
  <g class="f2" transform="translate(160, 50)" style="animation-delay: -0.5s;">
    <circle r="12" fill="#eab308" opacity="0.06" filter="url(#halo)" />
    <rect x="-12" y="-12" width="24" height="24" rx="4" fill="#f7df1e" />
    <text x="2" y="7" fill="#000" class="fo" font-weight="800" font-size="11" text-anchor="middle">JS</text>
    <text x="0" y="38" fill="#4b5563" class="fc" font-size="8" text-anchor="middle">JavaScript</text>
  </g>

  <!-- TypeScript -->
  <g class="f1" transform="translate(255, 50)" style="animation-delay: -1s;">
    <circle r="12" fill="#3b82f6" opacity="0.06" filter="url(#halo)" />
    <rect x="-12" y="-12" width="24" height="24" rx="4" fill="#007acc" />
    <text x="2" y="7" fill="#fff" class="fo" font-weight="800" font-size="11" text-anchor="middle">TS</text>
    <text x="0" y="38" fill="#4b5563" class="fc" font-size="8" text-anchor="middle">TypeScript</text>
  </g>

  <!-- Next.js -->
  <g class="f2" transform="translate(350, 50)" style="animation-delay: -1.5s;">
    <circle r="12" fill="#e2e8f0" opacity="0.04" filter="url(#halo)" />
    <circle r="13" fill="#000" stroke="#374151" stroke-width="1" />
    <text x="0" y="5" fill="#fff" class="fo" font-weight="800" font-size="14" text-anchor="middle">N</text>
    <text x="0" y="38" fill="#4b5563" class="fc" font-size="8" text-anchor="middle">Next.js</text>
  </g>

  <!-- Tailwind -->
  <g class="f1" transform="translate(445, 50)" style="animation-delay: -2s;">
    <circle r="12" fill="#06b6d4" opacity="0.06" filter="url(#halo)" />
    <g filter="url(#g)">
      <path d="M -11,0 C -5.5,-9 0,-9 5.5,0 C 11,9 16.5,9 22,0" fill="none" stroke="#38bdf8" stroke-width="2" transform="translate(-5.5, 0)" />
    </g>
    <text x="0" y="38" fill="#4b5563" class="fc" font-size="8" text-anchor="middle">Tailwind</text>
  </g>

  <!-- Node.js -->
  <g class="f2" transform="translate(540, 50)" style="animation-delay: -2.5s;">
    <circle r="12" fill="#22c55e" opacity="0.06" filter="url(#halo)" />
    <polygon points="0,-13 11,-6.5 11,6.5 0,13 -11,6.5 -11,-6.5" fill="none" stroke="#22c55e" stroke-width="1.5" />
    <circle r="3" fill="#22c55e" />
    <text x="0" y="38" fill="#4b5563" class="fc" font-size="8" text-anchor="middle">Node.js</text>
  </g>

  <!-- Express -->
  <g class="f1" transform="translate(635, 50)" style="animation-delay: -3s;">
    <circle r="12" fill="#6366f1" opacity="0.06" filter="url(#halo)" />
    <circle r="13" fill="#111827" stroke="#1f2937" stroke-width="1" />
    <text x="0" y="5" fill="#94a3b8" class="fc" font-weight="700" font-size="10" text-anchor="middle">ex</text>
    <text x="0" y="38" fill="#4b5563" class="fc" font-size="8" text-anchor="middle">Express</text>
  </g>

  <!-- PostgreSQL -->
  <g class="f2" transform="translate(730, 50)" style="animation-delay: -3.5s;">
    <circle r="12" fill="#6366f1" opacity="0.06" filter="url(#halo)" />
    <circle r="13" fill="#316192" stroke="#4f46e5" stroke-width="1" />
    <text x="0" y="5" fill="#fff" class="fo" font-weight="800" font-size="10" text-anchor="middle">PG</text>
    <text x="0" y="38" fill="#4b5563" class="fc" font-size="8" text-anchor="middle">Postgres</text>
  </g>

  <!-- Git -->
  <g class="f1" transform="translate(810, 50)" style="animation-delay: -4s;">
    <circle r="12" fill="#f05033" opacity="0.06" filter="url(#halo)" />
    <rect x="-9" y="-9" width="18" height="18" fill="none" stroke="#f05033" stroke-width="1.5" rx="2" transform="rotate(45)" />
    <circle cx="-2" cy="2" r="2" fill="#f05033" />
    <circle cx="2" cy="-2" r="2" fill="#f05033" />
    <line x1="-2" y1="2" x2="2" y2="-2" stroke="#f05033" stroke-width="1.2" />
    <text x="0" y="38" fill="#4b5563" class="fc" font-size="8" text-anchor="middle">Git</text>
  </g>
</svg>
