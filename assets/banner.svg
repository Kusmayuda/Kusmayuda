<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 360" width="100%" height="100%">
  <defs>
    <!-- Background Space Void Gradient -->
    <linearGradient id="bgSpace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020205" />
      <stop offset="60%" stop-color="#0a0817" />
      <stop offset="100%" stop-color="#010103" />
    </linearGradient>

    <!-- Metallic Chrome Gradient -->
    <linearGradient id="chromeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="30%" stop-color="#e2e8f0" />
      <stop offset="50%" stop-color="#94a3b8" />
      <stop offset="55%" stop-color="#475569" />
      <stop offset="85%" stop-color="#cbd5e1" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>

    <!-- Glowing effect -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="hyperGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="35" result="blur" />
    </filter>
  </defs>

  <style>
    <![CDATA[
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Fira+Code:wght@500;700&display=swap');
    
    .font-outfit { font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .font-code { font-family: 'Fira Code', monospace; }

    /* Ambient Auroras pulsing */
    @keyframes aurora1 {
      0%, 100% { transform: translate(0px, 0px) scale(1); opacity: 0.2; }
      50% { transform: translate(50px, 20px) scale(1.15); opacity: 0.35; }
    }
    @keyframes aurora2 {
      0%, 100% { transform: translate(0px, 0px) scale(1); opacity: 0.15; }
      50% { transform: translate(-40px, -30px) scale(1.1); opacity: 0.3; }
    }
    .aurora-cyan { animation: aurora1 14s ease-in-out infinite; }
    .aurora-pink { animation: aurora2 12s ease-in-out infinite; }

    /* 3D Rotating Globe */
    @keyframes globeRotate {
      0% { transform: scaleX(1); }
      50% { transform: scaleX(-1); }
      100% { transform: scaleX(1); }
    }
    .globe-long {
      fill: none;
      stroke: #38bdf8;
      stroke-width: 1.2;
      opacity: 0.35;
      animation: globeRotate 8s infinite linear;
      transform-origin: 0px 0px;
    }

    /* Subtitle Slide-Up-Fade transition */
    @keyframes slideUp1 {
      0%, 100% { opacity: 0; transform: translateY(12px); }
      5%, 28% { opacity: 1; transform: translateY(0); }
      33%, 95% { opacity: 0; transform: translateY(-12px); }
    }
    @keyframes slideUp2 {
      0%, 33.3%, 100% { opacity: 0; transform: translateY(12px); }
      38.3%, 61.3% { opacity: 1; transform: translateY(0); }
      66.3%, 95% { opacity: 0; transform: translateY(-12px); }
    }
    @keyframes slideUp3 {
      0%, 66.6%, 100% { opacity: 0; transform: translateY(12px); }
      71.6%, 94.6% { opacity: 1; transform: translateY(0); }
      99.6% { opacity: 0; transform: translateY(-12px); }
    }

    .slide-text-1 { animation: slideUp1 12s infinite ease-in-out; }
    .slide-text-2 { animation: slideUp2 12s infinite ease-in-out; }
    .slide-text-3 { animation: slideUp3 12s infinite ease-in-out; }

    /* Smooth Float for Title Card */
    @keyframes cardFloat {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-6px) rotate(0.5deg); }
    }
    .center-card {
      animation: cardFloat 7s ease-in-out infinite;
      transform-origin: center;
    }
    ]]>
  </style>

  <!-- Background Space Void -->
  <rect width="850" height="360" rx="16" fill="url(#bgSpace)" stroke="#111827" stroke-width="1.5" />

  <!-- Ambient Glowing Auroras -->
  <circle class="aurora-cyan" cx="150" cy="100" r="160" fill="#06b6d4" filter="url(#hyperGlow)" />
  <circle class="aurora-pink" cx="700" cy="220" r="170" fill="#db2777" filter="url(#hyperGlow)" />

  <!-- 3D Perspective Grid (fading into the void) -->
  <g stroke="#1e1b4b" stroke-width="1" opacity="0.3">
    <!-- Perspective lines radiating from vanishing point (425, -80) -->
    <line x1="425" y1="-80" x2="-200" y2="360" />
    <line x1="425" y1="-80" x2="-50" y2="360" />
    <line x1="425" y1="-80" x2="100" y2="360" />
    <line x1="425" y1="-80" x2="250" y2="360" />
    <line x1="425" y1="-80" x2="400" y2="360" />
    <line x1="425" y1="-80" x2="450" y2="360" />
    <line x1="425" y1="-80" x2="600" y2="360" />
    <line x1="425" y1="-80" x2="750" y2="360" />
    <line x1="425" y1="-80" x2="900" y2="360" />
    <line x1="425" y1="-80" x2="1050" y2="360" />
    
    <!-- Horizontal Perspective spacing lines -->
    <line x1="0" y1="80" x2="850" y2="80" opacity="0.1" />
    <line x1="0" y1="120" x2="850" y2="120" opacity="0.2" />
    <line x1="0" y1="170" x2="850" y2="170" opacity="0.3" />
    <line x1="0" y1="230" x2="850" y2="230" opacity="0.5" />
    <line x1="0" y1="300" x2="850" y2="300" opacity="0.8" />
  </g>

  <!-- 3D ROTATING GLOBE (Right side) -->
  <g transform="translate(680, 180) rotate(15)" opacity="0.8">
    <!-- Globe Base Outer Rings -->
    <circle cx="0" cy="0" r="75" fill="none" stroke="#1e293b" stroke-width="1" />
    <circle cx="0" cy="0" r="75" fill="none" stroke="#0ea5e9" stroke-width="1.5" opacity="0.35" filter="url(#neonGlow)" />
    
    <!-- Horizontal Latitudes -->
    <ellipse cx="0" cy="-45" rx="60" ry="14" fill="none" stroke="#38bdf8" stroke-width="0.8" opacity="0.3" />
    <ellipse cx="0" cy="-22" rx="71" ry="17" fill="none" stroke="#38bdf8" stroke-width="0.8" opacity="0.3" />
    <ellipse cx="0" cy="0" rx="75" ry="19" fill="none" stroke="#38bdf8" stroke-width="0.8" opacity="0.3" />
    <ellipse cx="0" cy="22" rx="71" ry="17" fill="none" stroke="#38bdf8" stroke-width="0.8" opacity="0.3" />
    <ellipse cx="0" cy="45" rx="60" ry="14" fill="none" stroke="#38bdf8" stroke-width="0.8" opacity="0.3" />

    <!-- Rotating Vertical Longitudes (staggered delay CSS transforms) -->
    <ellipse cx="0" cy="0" rx="75" ry="75" class="globe-long" style="animation-delay: 0s;" />
    <ellipse cx="0" cy="0" rx="75" ry="75" class="globe-long" style="animation-delay: -2s;" />
    <ellipse cx="0" cy="0" rx="75" ry="75" class="globe-long" style="animation-delay: -4s;" />
    <ellipse cx="0" cy="0" rx="75" ry="75" class="globe-long" style="animation-delay: -6s;" />
  </g>

  <!-- HUD Widescreen Accents & Crosshairs -->
  <g stroke="#334155" stroke-width="1" fill="none" opacity="0.5">
    <circle cx="70" cy="70" r="10" />
    <line x1="70" y1="55" x2="70" y2="85" />
    <line x1="55" y1="70" x2="85" y2="70" />
    <path d="M 30,30 L 15,30 M 15,30 L 15,45" stroke="#0ea5e9" stroke-width="1.5" />
    <path d="M 820,30 L 835,30 M 835,30 L 835,45" stroke="#f43f5e" stroke-width="1.5" />
  </g>

  <!-- CENTERPIECE: Translucent Obsidian Title Card -->
  <g class="center-card" transform="translate(130, 55)">
    <!-- Deep Card Shadow -->
    <rect x="-8" y="-8" width="466" height="266" rx="22" fill="#000" opacity="0.6" filter="url(#neonGlow)" />
    
    <!-- Obsidian Panel Frame -->
    <rect width="450" height="250" rx="16" fill="#04060c" fill-opacity="0.8" stroke="#1f2937" stroke-width="1.5" />
    <!-- Cyberpunk Corner Accents on Card -->
    <path d="M 0,20 L 20,0 M 450,230 L 430,250" stroke="#374151" stroke-width="1.5" />

    <!-- Glow bars on top/bottom of panel -->
    <rect x="30" y="0" width="390" height="2" rx="1" fill="url(#chromeGrad)" opacity="0.8" />
    
    <g transform="translate(45, 0)">
      <!-- Label -->
      <text x="0" y="70" fill="#4b5563" class="font-code" font-weight="700" font-size="11" letter-spacing="4">
        ACCESS_CODE::SECURE_PORTAL_
      </text>

      <!-- Elite Silver Name -->
      <text x="0" y="140" fill="url(#chromeGrad)" class="font-outfit" font-weight="800" font-size="58" filter="drop-shadow(0 4px 12px rgba(0,0,0,0.8))">
        Kusmayuda
      </text>

      <!-- Smooth Slide-Up Subtitle Stack -->
      <g transform="translate(0, 195)">
        <!-- Slide 1 -->
        <g class="slide-text-1">
          <text x="0" y="0" fill="#06b6d4" class="font-code" font-size="18" font-weight="700" filter="url(#neonGlow)">
            &gt; [ WEB ARCHITECT ]
          </text>
        </g>
        <!-- Slide 2 -->
        <g class="slide-text-2">
          <text x="0" y="0" fill="#6366f1" class="font-code" font-size="18" font-weight="700" filter="url(#neonGlow)">
            &gt; [ FRONTEND ENGINEER ]
          </text>
        </g>
        <!-- Slide 3 -->
        <g class="slide-text-3">
          <text x="0" y="0" fill="#ec4899" class="font-code" font-size="18" font-weight="700" filter="url(#neonGlow)">
            &gt; [ CREATIVE CODER ]
          </text>
        </g>
      </g>
    </g>

    <!-- Interactive Status Dot inside Card -->
    <circle cx="25" cy="225" r="4.5" fill="#10b981" filter="url(#neonGlow)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" />
    </circle>
    <text x="40" y="228" fill="#4b5563" class="font-code" font-size="9">NODE_01//STABLE</text>
  </g>
</svg>
