<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 280" width="100%" height="100%">
  <defs>
    <radialGradient id="bg" cx="30%" cy="40%">
      <stop offset="0%" stop-color="#0c0c18" />
      <stop offset="100%" stop-color="#020205" />
    </radialGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent" />
      <stop offset="20%" stop-color="#06b6d4" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="80%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="transparent" />
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent" />
      <stop offset="40%" stop-color="transparent" />
      <stop offset="50%" stop-color="rgba(255,255,255,0.5)" />
      <stop offset="60%" stop-color="transparent" />
      <stop offset="100%" stop-color="transparent" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b" />
      <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="coreGlow">
      <feGaussianBlur stdDeviation="6" result="b" />
      <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <style>
    <![CDATA[
    .fo { font-family: 'Outfit', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif; }
    .fc { font-family: 'Fira Code', 'SF Mono', 'Cascadia Code', 'Consolas', monospace; }

    /* ===== 3D GYROSCOPE RINGS ===== */
    @keyframes gyro1 {
      0%   { transform: rotate(0deg) scaleX(1); }
      25%  { transform: rotate(90deg) scaleX(0.12); }
      50%  { transform: rotate(180deg) scaleX(1); }
      75%  { transform: rotate(270deg) scaleX(0.12); }
      100% { transform: rotate(360deg) scaleX(1); }
    }
    @keyframes gyro2 {
      0%   { transform: rotate(0deg) scaleX(0.12); }
      25%  { transform: rotate(90deg) scaleX(1); }
      50%  { transform: rotate(180deg) scaleX(0.12); }
      75%  { transform: rotate(270deg) scaleX(1); }
      100% { transform: rotate(360deg) scaleX(0.12); }
    }
    @keyframes gyro3 {
      0%   { transform: rotate(0deg) scaleX(0.6); }
      25%  { transform: rotate(90deg) scaleX(0.12); }
      50%  { transform: rotate(180deg) scaleX(0.6); }
      75%  { transform: rotate(270deg) scaleX(1); }
      100% { transform: rotate(360deg) scaleX(0.6); }
    }
    .ring-1 { animation: gyro1 8s linear infinite; transform-origin: 0 0; }
    .ring-2 { animation: gyro2 10s linear infinite; transform-origin: 0 0; }
    .ring-3 { animation: gyro3 12s linear infinite; transform-origin: 0 0; }

    /* Core pulse */
    @keyframes corePulse {
      0%, 100% { r: 4; opacity: 0.7; }
      50% { r: 6; opacity: 1; }
    }
    .core { animation: corePulse 3s ease-in-out infinite; }

    /* ===== SUBTITLE FADE ROTATION ===== */
    @keyframes fade1 {
      0%, 100% { opacity: 0; transform: translateY(8px); }
      8%, 28% { opacity: 1; transform: translateY(0); }
      33% { opacity: 0; transform: translateY(-8px); }
    }
    @keyframes fade2 {
      0%, 33% { opacity: 0; transform: translateY(8px); }
      41%, 61% { opacity: 1; transform: translateY(0); }
      66% { opacity: 0; transform: translateY(-8px); }
    }
    @keyframes fade3 {
      0%, 66% { opacity: 0; transform: translateY(8px); }
      74%, 94% { opacity: 1; transform: translateY(0); }
      99% { opacity: 0; transform: translateY(-8px); }
    }
    .fade-1 { animation: fade1 12s ease-in-out infinite; }
    .fade-2 { animation: fade2 12s ease-in-out infinite; }
    .fade-3 { animation: fade3 12s ease-in-out infinite; }

    /* ===== SHIMMER SWEEP ===== */
    @keyframes sweepShimmer {
      0% { transform: translateX(-500px); }
      100% { transform: translateX(500px); }
    }
    .shimmer-sweep { animation: sweepShimmer 5s ease-in-out infinite; }

    /* ===== SUBTLE STAR TWINKLE ===== */
    @keyframes twinkle {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.6; }
    }
    .star { animation: twinkle 4s ease-in-out infinite; }
    ]]>
  </style>

  <!-- Background -->
  <rect width="850" height="280" rx="18" fill="url(#bg)" stroke="#111827" stroke-width="1" />

  <!-- Subtle scattered stars (very few, very subtle) -->
  <circle class="star" cx="120" cy="35" r="1" fill="#e2e8f0" style="animation-delay: 0s;" />
  <circle class="star" cx="310" cy="22" r="0.8" fill="#cbd5e1" style="animation-delay: -1s;" />
  <circle class="star" cx="480" cy="45" r="0.7" fill="#94a3b8" style="animation-delay: -2s;" />
  <circle class="star" cx="200" cy="250" r="0.9" fill="#cbd5e1" style="animation-delay: -3s;" />
  <circle class="star" cx="400" cy="240" r="0.7" fill="#94a3b8" style="animation-delay: -1.5s;" />
  <circle class="star" cx="750" cy="30" r="0.8" fill="#e2e8f0" style="animation-delay: -2.5s;" />
  <circle class="star" cx="830" cy="200" r="0.6" fill="#94a3b8" style="animation-delay: -0.5s;" />

  <!-- ===== LEFT: TEXT CONTENT ===== -->
  <g transform="translate(60, 0)">
    <!-- Greeting label -->
    <text x="0" y="75" fill="#6b7280" class="fc" font-size="13" font-weight="500" letter-spacing="3">
      HELLO, I'M
    </text>

    <!-- Name -->
    <text x="0" y="135" fill="#f8fafc" class="fo" font-weight="800" font-size="56">
      Kusmayuda
    </text>

    <!-- Animated gradient underline -->
    <rect x="0" y="148" width="340" height="3" rx="1.5" fill="url(#accentLine)" />
    <clipPath id="underlineClip"><rect x="0" y="146" width="340" height="5" /></clipPath>
    <g clip-path="url(#underlineClip)">
      <rect class="shimmer-sweep" x="-200" y="146" width="120" height="5" fill="#ffffff" opacity="0.25" rx="2.5" />
    </g>

    <!-- Rotating subtitles -->
    <g transform="translate(0, 190)">
      <g class="fade-1">
        <text x="0" y="0" fill="#06b6d4" class="fc" font-size="16" font-weight="500">Web Developer</text>
      </g>
      <g class="fade-2">
        <text x="0" y="0" fill="#8b5cf6" class="fc" font-size="16" font-weight="500">Frontend Engineer</text>
      </g>
      <g class="fade-3">
        <text x="0" y="0" fill="#ec4899" class="fc" font-size="16" font-weight="500">Creative Coder</text>
      </g>
    </g>

    <!-- Location -->
    <text x="0" y="235" fill="#4b5563" class="fc" font-size="11">Indonesia</text>
  </g>

  <!-- ===== RIGHT: 3D GYROSCOPE ===== -->
  <g transform="translate(640, 140)">
    <!-- Ambient glow behind gyroscope -->
    <circle r="45" fill="#06b6d4" opacity="0.06" filter="url(#coreGlow)" />

    <!-- Ring 1: Cyan (no tilt) -->
    <circle class="ring-1" r="55" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="12 18" opacity="0.7" />

    <!-- Ring 2: Purple (tilted 60°) -->
    <g transform="rotate(60)">
      <circle class="ring-2" r="55" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="16 14" opacity="0.7" />
    </g>

    <!-- Ring 3: Pink (tilted 120°) -->
    <g transform="rotate(120)">
      <circle class="ring-3" r="55" fill="none" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="10 20" opacity="0.7" />
    </g>

    <!-- Core dot -->
    <circle class="core" r="4" fill="#06b6d4" filter="url(#glow)" />
    <circle r="1.5" fill="#ffffff" />

    <!-- Tiny orbital debris dots -->
    <circle cx="30" cy="-40" r="1.2" fill="#8b5cf6" opacity="0.3" class="star" style="animation-delay: -1s;" />
    <circle cx="-35" cy="25" r="1" fill="#06b6d4" opacity="0.3" class="star" style="animation-delay: -2s;" />
    <circle cx="20" cy="45" r="0.8" fill="#ec4899" opacity="0.3" class="star" style="animation-delay: -3s;" />
  </g>

  <!-- Bottom accent line -->
  <rect x="60" y="272" width="730" height="1.5" rx="0.75" fill="url(#accentLine)" opacity="0.4" />
</svg>
