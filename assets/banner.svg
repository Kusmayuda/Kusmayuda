<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 320" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d" />
      <stop offset="50%" stop-color="#070b19" />
      <stop offset="100%" stop-color="#02040a" />
    </linearGradient>

    <!-- Text Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>

    <!-- Glowing effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" result="blur" />
    </filter>
  </defs>

  <style>
    <![CDATA[
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Fira+Code:wght@400;500&display=swap');
    
    .font-outfit { font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .font-code { font-family: 'Fira Code', monospace; }

    /* Keyframe Animations */
    @keyframes float {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(3deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    @keyframes float-reverse {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(8px) rotate(-3deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.15; transform: scale(1); }
      50% { opacity: 0.35; transform: scale(1.1); }
    }

    /* Subtitle Rotator */
    @keyframes phrase1 {
      0%, 30% { opacity: 1; }
      33%, 100% { opacity: 0; }
    }
    @keyframes phrase2 {
      0%, 33% { opacity: 0; }
      36%, 66% { opacity: 1; }
      69%, 100% { opacity: 0; }
    }
    @keyframes phrase3 {
      0%, 69% { opacity: 0; }
      72%, 96% { opacity: 1; }
      99%, 100% { opacity: 0; }
    }

    /* Individual element animations */
    .floating-1 { animation: float 6s ease-in-out infinite; transform-origin: center; }
    .floating-2 { animation: float-reverse 8s ease-in-out infinite; transform-origin: center; }
    .pulse-glow1 { animation: glowPulse 8s ease-in-out infinite; transform-origin: 200px 100px; }
    .pulse-glow2 { animation: glowPulse 10s ease-in-out infinite; transform-origin: 650px 220px; }

    /* Subtitle phrases styling & sequential display */
    .phrase {
      animation-duration: 12s;
      animation-iteration-count: infinite;
      animation-timing-function: ease-in-out;
    }
    .p1 { animation-name: phrase1; }
    .p2 { animation-name: phrase2; }
    .p3 { animation-name: phrase3; }

    .cursor {
      animation: cursorBlink 0.8s infinite;
    }
    @keyframes cursorBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    
    /* Grid background movement */
    @keyframes gridMove {
      0% { transform: translateY(0); }
      100% { transform: translateY(40px); }
    }
    .grid-lines {
      stroke: #1e293b;
      stroke-width: 1;
      opacity: 0.25;
      animation: gridMove 12s linear infinite;
    }

    /* Pure CSS clip-path scaling and cursor translations */
    @keyframes scale1 {
      0%, 100% { transform: scaleX(0); }
      10%, 27.5% { transform: scaleX(1); }
      30% { transform: scaleX(0); }
    }
    @keyframes cursor1 {
      0%, 100% { transform: translateX(0); }
      10%, 27.5% { transform: translateX(165px); }
      30% { transform: translateX(0); }
    }
    #clipRect1 {
      animation: scale1 12s infinite ease-in-out;
      transform-origin: 0px 190px;
    }
    #cursor1 {
      animation: cursor1 12s infinite ease-in-out, cursorBlink 0.8s infinite;
    }

    @keyframes scale2 {
      0%, 33.3%, 100% { transform: scaleX(0); }
      43.3%, 60.8% { transform: scaleX(1); }
      63.3% { transform: scaleX(0); }
    }
    @keyframes cursor2 {
      0%, 33.3%, 100% { transform: translateX(0); }
      43.3%, 60.8% { transform: translateX(230px); }
      63.3% { transform: translateX(0); }
    }
    #clipRect2 {
      animation: scale2 12s infinite ease-in-out;
      transform-origin: 0px 190px;
    }
    #cursor2 {
      animation: cursor2 12s infinite ease-in-out, cursorBlink 0.8s infinite;
    }

    @keyframes scale3 {
      0%, 66.6%, 100% { transform: scaleX(0); }
      76.6%, 94.1% { transform: scaleX(1); }
      96.6% { transform: scaleX(0); }
    }
    @keyframes cursor3 {
      0%, 66.6%, 100% { transform: translateX(0); }
      76.6%, 94.1% { transform: translateX(180px); }
      96.6% { transform: translateX(0); }
    }
    #clipRect3 {
      animation: scale3 12s infinite ease-in-out;
      transform-origin: 0px 190px;
    }
    #cursor3 {
      animation: cursor3 12s infinite ease-in-out, cursorBlink 0.8s infinite;
    }
    ]]>
  </style>

  <!-- Background Rect -->
  <rect width="850" height="320" rx="16" fill="url(#bgGrad)" />

  <!-- Grid Pattern Overlay -->
  <g class="grid-lines">
    <!-- horizontal grid lines moving -->
    <path d="M 0,-40 L 850,-40 M 0,0 L 850,0 M 0,40 L 850,40 M 0,80 L 850,80 M 0,120 L 850,120 M 0,160 L 850,160 M 0,200 L 850,200 M 0,240 L 850,240 M 0,280 L 850,280 M 0,320 L 850,320 M 0,360 L 850,360" />
    <!-- vertical grid lines -->
    <path d="M 0,0 L 0,360 M 50,0 L 50,360 M 100,0 L 100,360 M 150,0 L 150,360 M 200,0 L 200,360 M 250,0 L 250,360 M 300,0 L 300,360 M 350,0 L 350,360 M 400,0 L 400,360 M 450,0 L 450,360 M 500,0 L 500,360 M 550,0 L 550,360 M 600,0 L 600,360 M 650,0 L 650,360 M 700,0 L 700,360 M 750,0 L 750,360 M 800,0 L 800,360 M 850,0 L 850,360" />
  </g>

  <!-- Ambient Glowing Blobs -->
  <circle cx="200" cy="100" r="120" fill="#3b82f6" filter="url(#softGlow)" class="pulse-glow1" />
  <circle cx="650" cy="220" r="140" fill="#a855f7" filter="url(#softGlow)" class="pulse-glow2" />

  <!-- Code Decorators in Background (Floating) -->
  <g class="floating-1">
    <text x="80" y="80" fill="#38bdf8" opacity="0.2" class="font-code" font-size="20">const dev = true;</text>
    <text x="720" y="90" fill="#c084fc" opacity="0.15" class="font-code" font-size="32">{}</text>
  </g>
  <g class="floating-2">
    <text x="710" y="240" fill="#38bdf8" opacity="0.15" class="font-code" font-size="18">{} // developer</text>
    <text x="120" y="250" fill="#818cf8" opacity="0.2" class="font-code" font-size="26">[]</text>
    <circle cx="520" cy="70" r="4" fill="#34d399" opacity="0.3" />
    <circle cx="340" cy="260" r="6" fill="#fbbf24" opacity="0.2" />
  </g>

  <!-- Main Content Greeting -->
  <g transform="translate(80, 0)">
    <!-- Welcome Label -->
    <text x="0" y="100" fill="#94a3b8" class="font-outfit" font-weight="600" font-size="16" letter-spacing="2">
      HELLO WORLD, I'M
    </text>

    <!-- Name Heading -->
    <text x="0" y="160" fill="url(#textGrad)" class="font-outfit" font-weight="800" font-size="52" filter="url(#glow)">
      Kusmayuda
    </text>

    <!-- Subtitle (Animated Typing) -->
    <!-- Phase 1: Web Developer -->
    <g class="phrase p1">
      <clipPath id="clip1">
        <rect id="clipRect1" x="0" y="175" width="200" height="45" />
      </clipPath>
      <text x="0" y="212" fill="#f8fafc" class="font-code" font-size="20" font-weight="500" clip-path="url(#clip1)">
        &gt; Web Developer
      </text>
      <!-- Cursor 1 -->
      <rect id="cursor1" x="15" y="192" width="3" height="22" fill="#38bdf8" class="cursor" />
    </g>

    <!-- Phase 2: Frontend Architect -->
    <g class="phrase p2">
      <clipPath id="clip2">
        <rect id="clipRect2" x="0" y="175" width="260" height="45" />
      </clipPath>
      <text x="0" y="212" fill="#38bdf8" class="font-code" font-size="20" font-weight="500" clip-path="url(#clip2)">
        &gt; Frontend Architect
      </text>
      <!-- Cursor 2 -->
      <rect id="cursor2" x="15" y="192" width="3" height="22" fill="#38bdf8" class="cursor" />
    </g>

    <!-- Phase 3: Problem Solver -->
    <g class="phrase p3">
      <clipPath id="clip3">
        <rect id="clipRect3" x="0" y="175" width="210" height="45" />
      </clipPath>
      <text x="0" y="212" fill="#c084fc" class="font-code" font-size="20" font-weight="500" clip-path="url(#clip3)">
        &gt; Problem Solver
      </text>
      <!-- Cursor 3 -->
      <rect id="cursor3" x="15" y="192" width="3" height="22" fill="#38bdf8" class="cursor" />
    </g>
    
    <!-- Short intro description in SVG -->
    <text x="0" y="255" fill="#64748b" class="font-outfit" font-weight="400" font-size="15">
      Crafting elegant, accessible, and high-performance digital experiences.
    </text>
  </g>

  <!-- Glowing accent border at the bottom -->
  <rect x="5" y="313" width="840" height="3" rx="1.5" fill="url(#textGrad)" opacity="0.8" filter="url(#glow)" />
</svg>
