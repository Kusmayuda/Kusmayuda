<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 200" width="100%" height="100%">
  <defs>
    <filter id="g">
      <feGaussianBlur stdDeviation="3" result="b" />
      <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <style>
    <![CDATA[
    .fo { font-family: 'Outfit', -apple-system, sans-serif; }
    .fc { font-family: 'Fira Code', 'Consolas', monospace; }

    /* Progress bar fill */
    @keyframes fillBar {
      from { width: 0; }
      to { width: 130px; }
    }
    .progress-fill { animation: fillBar 2s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

    /* Cursor blink */
    @keyframes blink { 50% { opacity: 0; } }
    .cursor { animation: blink 0.8s step-end infinite; }

    /* Status dot pulse */
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; filter: drop-shadow(0 0 3px #10b981); }
    }
    .status-pulse { animation: pulse 2s ease-in-out infinite; }
    ]]>
  </style>

  <!-- Card -->
  <rect width="460" height="200" rx="14" fill="#050508" stroke="#1f2937" stroke-width="1" />

  <!-- Window header -->
  <rect width="460" height="34" rx="14" fill="#020205" />
  <rect y="24" width="460" height="10" fill="#020205" />
  <circle cx="18" cy="17" r="4.5" fill="#ef4444" />
  <circle cx="34" cy="17" r="4.5" fill="#eab308" />
  <circle cx="50" cy="17" r="4.5" fill="#22c55e" />
  <text x="80" y="21" fill="#4b5563" class="fc" font-size="10">kusmayuda ~ terminal</text>

  <!-- Terminal content -->
  <g class="fc" font-size="11.5" transform="translate(22, 58)">
    <text x="0" y="12"><tspan fill="#06b6d4">~</tspan> <tspan fill="#6b7280">$</tspan> <tspan fill="#e2e8f0">whoami</tspan></text>
    <text x="0" y="32" fill="#94a3b8">Kusmayuda - Web Developer</text>

    <text x="0" y="58"><tspan fill="#06b6d4">~</tspan> <tspan fill="#6b7280">$</tspan> <tspan fill="#e2e8f0">cat status.log</tspan></text>
    <text x="0" y="78" fill="#94a3b8">Building modern web applications</text>
    <text x="0" y="98" fill="#94a3b8">with React, Next.js, and Node.js</text>

    <text x="0" y="124"><tspan fill="#06b6d4">~</tspan> <tspan fill="#6b7280">$</tspan> <tspan fill="#e2e8f0">_</tspan></text>
    <rect class="cursor" x="30" y="113" width="7" height="13" fill="#e2e8f0" />
  </g>

  <!-- Right side: Mini gauge -->
  <g transform="translate(340, 70)">
    <!-- Progress bar -->
    <text x="0" y="0" fill="#374151" class="fc" font-size="8" letter-spacing="1">FOCUS</text>
    <rect x="0" y="8" width="90" height="6" rx="3" fill="#111827" />
    <rect class="progress-fill" x="0" y="8" width="0" height="6" rx="3" fill="#06b6d4" filter="url(#g)" />
    <text x="95" y="14" fill="#4b5563" class="fc" font-size="8">90%</text>

    <!-- Status -->
    <g transform="translate(0, 40)">
      <circle cx="5" cy="5" r="4" fill="#10b981" class="status-pulse" />
      <text x="15" y="8" fill="#4b5563" class="fc" font-size="8">AVAILABLE</text>
    </g>

    <!-- Uptime -->
    <g transform="translate(0, 65)">
      <text x="0" y="0" fill="#374151" class="fc" font-size="8" letter-spacing="1">UPTIME</text>
      <text x="0" y="15" fill="#6b7280" class="fc" font-size="12">99.9%</text>
    </g>
  </g>
</svg>
