<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 240" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020205" />
      <stop offset="100%" stop-color="#070913" />
    </linearGradient>

    <!-- Glowing effects -->
    <filter id="cyanGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    <![CDATA[
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Outfit:wght@400;600&display=swap');
    
    .font-outfit { font-family: 'Outfit', sans-serif; }
    .font-code { font-family: 'Fira Code', monospace; }

    .window-btn { transition: transform 0.2s; }
    .window-btn:hover { transform: scale(1.2); }

    /* Equalizer Bouncing Bars */
    @keyframes eq1 { 0%, 100% { height: 12px; y: 148px; } 50% { height: 35px; y: 125px; } }
    @keyframes eq2 { 0%, 100% { height: 42px; y: 118px; } 50% { height: 18px; y: 142px; } }
    @keyframes eq3 { 0%, 100% { height: 22px; y: 138px; } 50% { height: 48px; y: 112px; } }
    @keyframes eq4 { 0%, 100% { height: 48px; y: 112px; } 50% { height: 25px; y: 135px; } }

    .bar-1 { animation: eq1 1.6s infinite ease-in-out; }
    .bar-2 { animation: eq2 2s infinite ease-in-out; }
    .bar-3 { animation: eq3 1.4s infinite ease-in-out; }
    .bar-4 { animation: eq4 1.8s infinite ease-in-out; }

    /* Circular Uptime progress Dial */
    @keyframes dialFill {
      from { stroke-dashoffset: 113; }
      to { stroke-dashoffset: 20; } /* 82% efficiency load */
    }
    .dial-progress {
      stroke-dasharray: 113;
      stroke-dashoffset: 113;
      animation: dialFill 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      transform: rotate(-90deg);
      transform-origin: 435px 135px;
    }

    /* Waveform Scroll Animation */
    @keyframes waveScroll {
      to { stroke-dashoffset: -20; }
    }
    .wave-line {
      stroke-dasharray: 4 4;
      animation: waveScroll 1.5s linear infinite;
    }

    /* Terminal Blinking Cursor */
    @keyframes terminalCursor {
      50% { opacity: 0; }
    }
    .term-cursor { animation: terminalCursor 0.8s step-end infinite; }

    /* Pulsing Green status node */
    @keyframes greenNodePulse {
      0%, 100% { fill: #10b981; opacity: 0.4; }
      50% { fill: #34d399; opacity: 1; filter: drop-shadow(0 0 2px #34d399); }
    }
    .health-dot { animation: greenNodePulse 2.2s infinite ease-in-out; }
    ]]>
  </style>

  <!-- Obsidian Card Frame -->
  <rect width="500" height="240" rx="14" fill="url(#cardBg)" stroke="#1f2937" stroke-width="1.5" />

  <!-- Window Header -->
  <rect width="500" height="35" rx="14" fill="#020205" />
  <rect y="25" width="500" height="10" fill="#020205" />

  <!-- Window controls -->
  <circle cx="20" cy="18" r="5" fill="#ef4444" class="window-btn" />
  <circle cx="36" cy="18" r="5" fill="#eab308" class="window-btn" />
  <circle cx="52" cy="18" r="5" fill="#22c55e" class="window-btn" />

  <!-- Active Tab -->
  <path d="M 80,35 L 95,12 L 235,12 L 250,35 Z" fill="#020205" stroke="#1f2937" stroke-width="1" />
  <rect x="81" y="34" width="168" height="2" fill="#020205" />
  
  <text x="110" y="25" fill="#6b7280" class="font-code" font-size="11" font-weight="500">system_monitor.sh</text>
  <text x="218" y="24" fill="#4b5563" class="font-outfit" font-size="10">×</text>

  <!-- COLUMN 1: Terminal Console Logs (Left) -->
  <g class="font-code" font-size="12" fill="#94a3b8" transform="translate(25, 65)">
    <text x="0" y="15" fill="#06b6d4">yuda@system:~$</text>
    <text x="110" y="15" fill="#f8fafc">init_profile</text>
    
    <text x="10" y="35" fill="#4b5563">[OK] <tspan fill="#10b981">loaded core system modules</tspan></text>
    <text x="10" y="55" fill="#4b5563">[OK] <tspan fill="#10b981">established network connections</tspan></text>

    <text x="0" y="80" fill="#06b6d4">yuda@system:~$</text>
    <text x="110" y="80" fill="#f8fafc">npm run develop</text>
    
    <text x="10" y="100" fill="#ec4899">&gt; status: active_coding</text>
    <text x="10" y="120" fill="#4b5563">&gt; ready to build the web_</text>
    
    <rect class="term-cursor" x="198" y="109" width="7" height="12" fill="#94a3b8" />
  </g>

  <!-- Vertical Divider -->
  <line x1="310" y1="50" x2="310" y2="210" stroke="#111827" stroke-dasharray="4 6" stroke-width="1.5" />

  <!-- COLUMN 2: System Monitor Visualizers (Right) -->
  <g transform="translate(325, 55)">
    <text x="10" y="15" fill="#374151" class="font-code" font-size="9" letter-spacing="1">SYSTEM_METRICS</text>
    
    <!-- CPU Equalizer Bars -->
    <g transform="translate(10, 10)">
      <rect class="bar-1" x="0" y="120" width="8" height="40" rx="3" fill="#06b6d4" filter="url(#cyanGlow)" />
      <rect class="bar-2" x="14" y="110" width="8" height="50" rx="3" fill="#6366f1" />
      <rect class="bar-3" x="28" y="125" width="8" height="35" rx="3" fill="#a855f7" />
      <rect class="bar-4" x="42" y="100" width="8" height="60" rx="3" fill="#ec4899" />
    </g>

    <!-- Uptime Circular progress Gauge Dial (at x=110, y=135) -->
    <g transform="translate(10, 10)">
      <!-- Background track circle -->
      <circle cx="100" cy="125" r="18" fill="none" stroke="#111827" stroke-width="3" />
      <!-- Glowing active progress circle -->
      <circle class="dial-progress" cx="435" cy="135" r="18" fill="none" stroke="#06b6d4" stroke-width="3.5" filter="url(#cyanGlow)" />
      <!-- Center text inside dial -->
      <text x="100" y="129" fill="#06b6d4" class="font-code" font-size="9" font-weight="700" text-anchor="middle">82%</text>
      <!-- Gauge Title -->
      <text x="100" y="102" fill="#374151" class="font-code" font-size="8" text-anchor="middle">UPTIME</text>
    </g>

    <!-- Scrolling Oscillation Waveform -->
    <g transform="translate(10, 95)" opacity="0.5">
      <path d="M 0,20 Q 15,5 30,20 T 60,20 T 90,20 T 120,20" fill="none" stroke="#06b6d4" stroke-width="1.5" class="wave-line" />
      <text x="0" y="-5" fill="#374151" class="font-code" font-size="8">SYS_OSCILLOSCOPE</text>
    </g>

    <!-- Health node -->
    <g transform="translate(10, 142)">
      <rect width="130" height="24" rx="12" fill="#020205" stroke="#111827" stroke-width="1" />
      <circle cx="15" cy="12" r="4" class="health-dot" />
      <text x="28" y="15" fill="#4b5563" class="font-outfit" font-weight="600" font-size="8.5" letter-spacing="0.5">SYSTEM_LOAD: OPTIMAL</text>
    </g>
  </g>
</svg>
