<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 240" width="100%" height="100%">
  <defs>
    <!-- Card Background Gradient -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070b19" />
      <stop offset="100%" stop-color="#0a0f1d" />
    </linearGradient>

    <!-- Glowing effects -->
    <filter id="neonBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="neonPink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    <![CDATA[
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Outfit:wght@400;600&display=swap');
    
    .font-outfit { font-family: 'Outfit', sans-serif; }
    .font-code { font-family: 'Fira Code', monospace; }

    /* Window controls hover animation */
    .window-btn { transition: transform 0.2s; }
    .window-btn:hover { transform: scale(1.2); }

    /* Equalizer Bouncing Bars (aligned bottom at y=160) */
    @keyframes eq1 { 0%, 100% { height: 15px; y: 145px; } 50% { height: 40px; y: 120px; } }
    @keyframes eq2 { 0%, 100% { height: 45px; y: 115px; } 50% { height: 20px; y: 140px; } }
    @keyframes eq3 { 0%, 100% { height: 25px; y: 135px; } 50% { height: 55px; y: 105px; } }
    @keyframes eq4 { 0%, 100% { height: 50px; y: 110px; } 50% { height: 30px; y: 130px; } }
    @keyframes eq5 { 0%, 100% { height: 20px; y: 140px; } 50% { height: 45px; y: 115px; } }

    .bar-1 { animation: eq1 1.8s infinite ease-in-out; }
    .bar-2 { animation: eq2 2.2s infinite ease-in-out; }
    .bar-3 { animation: eq3 1.5s infinite ease-in-out; }
    .bar-4 { animation: eq4 2s infinite ease-in-out; }
    .bar-5 { animation: eq5 1.7s infinite ease-in-out; }

    /* Waveform Scroll Animation */
    @keyframes waveScroll {
      to { stroke-dashoffset: -20; }
    }
    .wave-line {
      stroke-dasharray: 4 4;
      animation: waveScroll 1.5s linear infinite;
    }

    /* Terminal Blinking Cursor */
    @keyframes terminalCursor {
      50% { opacity: 0; }
    }
    .term-cursor { animation: terminalCursor 0.8s step-end infinite; }

    /* Live pulse health node */
    @keyframes healthPulse {
      0%, 100% { fill: #10b981; opacity: 0.5; filter: none; }
      50% { fill: #34d399; opacity: 1; filter: drop-shadow(0 0 2px #34d399); }
    }
    .health-node { animation: healthPulse 2s infinite ease-in-out; }
    ]]>
  </style>

  <!-- Card Border & Background -->
  <rect width="500" height="240" rx="14" fill="url(#cardBg)" stroke="#1e293b" stroke-width="1.5" />

  <!-- Window Header -->
  <rect width="500" height="35" rx="14" fill="#04060c" />
  <!-- Crop bottom corners of header -->
  <rect y="25" width="500" height="10" fill="#04060c" />

  <!-- Window controls -->
  <circle cx="20" cy="18" r="5" fill="#ef4444" class="window-btn" />
  <circle cx="36" cy="18" r="5" fill="#eab308" class="window-btn" />
  <circle cx="52" cy="18" r="5" fill="#22c55e" class="window-btn" />

  <!-- Active Tab -->
  <path d="M 80,35 L 95,12 L 235,12 L 250,35 Z" fill="#070b19" stroke="#1e293b" stroke-width="1" />
  <rect x="81" y="34" width="168" height="2" fill="#070b19" /> <!-- mask tab line border -->
  
  <text x="110" y="25" fill="#94a3b8" class="font-code" font-size="11" font-weight="500">system_monitor.sh</text>
  <!-- Tab Close Icon -->
  <text x="218" y="24" fill="#64748b" class="font-outfit" font-size="10">×</text>

  <!-- COLUMN 1: Terminal Console Logs (Left) -->
  <g class="font-code" font-size="12" fill="#94a3b8" transform="translate(25, 65)">
    <!-- Prompt 1 -->
    <text x="0" y="15" fill="#38bdf8">yuda@system:~$</text>
    <text x="110" y="15" fill="#f8fafc">init_profile</text>
    
    <!-- Logs -->
    <text x="10" y="35" fill="#64748b">[OK] <tspan fill="#34d399">loaded core system modules</tspan></text>
    <text x="10" y="55" fill="#64748b">[OK] <tspan fill="#34d399">established network connections</tspan></text>

    <!-- Prompt 2 -->
    <text x="0" y="80" fill="#38bdf8">yuda@system:~$</text>
    <text x="110" y="80" fill="#f8fafc">npm run develop</text>
    
    <!-- Active Status Output -->
    <text x="10" y="100" fill="#ec4899">&gt; status: active_coding</text>
    <text x="10" y="120" fill="#64748b">&gt; ready to build the web_</text>
    
    <!-- Flashing terminal cursor -->
    <rect class="term-cursor" x="198" y="109" width="7" height="12" fill="#94a3b8" />
  </g>

  <!-- Vertical Divider (HUD style dashed line) -->
  <line x1="310" y1="50" x2="310" y2="210" stroke="#1e293b" stroke-dasharray="4 6" stroke-width="1.5" />

  <!-- COLUMN 2: System Monitor Visualizers (Right) -->
  <g transform="translate(325, 55)">
    <!-- Box Title -->
    <text x="10" y="15" fill="#4b5563" class="font-code" font-size="9" letter-spacing="1">SYSTEM_METRICS</text>
    
    <!-- CPU Bouncing Equalizer Bars -->
    <g transform="translate(10, 10)">
      <rect class="bar-1" x="0" y="120" width="8" height="40" rx="3" fill="#06b6d4" filter="url(#neonBlue)" />
      <rect class="bar-2" x="14" y="110" width="8" height="50" rx="3" fill="#3b82f6" />
      <rect class="bar-3" x="28" y="125" width="8" height="35" rx="3" fill="#8b5cf6" />
      <rect class="bar-4" x="42" y="100" width="8" height="60" rx="3" fill="#a855f7" />
      <rect class="bar-5" x="56" y="115" width="8" height="45" rx="3" fill="#ec4899" filter="url(#neonPink)" />
    </g>

    <!-- Scrolling Oscillation Waveform -->
    <g transform="translate(10, 95)" opacity="0.6">
      <path d="M 0,20 Q 15,5 30,20 T 60,20 T 90,20 T 120,20" fill="none" stroke="#06b6d4" stroke-width="1.5" class="wave-line" />
      <text x="0" y="-5" fill="#4b5563" class="font-code" font-size="8">OSCILLOSCOPE: OK</text>
    </g>

    <!-- Activity Indicator Gauge / System Info -->
    <g transform="translate(10, 142)">
      <rect width="130" height="24" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1" />
      <!-- Pulsing Node -->
      <circle cx="15" cy="12" r="4.5" class="health-node" />
      <!-- System status text -->
      <text x="28" y="15" fill="#64748b" class="font-outfit" font-weight="600" font-size="9" letter-spacing="0.5">CPU LOAD: OPTIMAL</text>
    </g>
  </g>
</svg>
