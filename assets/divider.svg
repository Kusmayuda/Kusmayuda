<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 12" width="100%" height="100%">
  <defs>
    <linearGradient id="divGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0" />
      <stop offset="20%" stop-color="#06b6d4" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#a855f7" stop-opacity="1" />
      <stop offset="80%" stop-color="#ec4899" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </linearGradient>
    <filter id="dg" x="-5%" y="-50%" width="110%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b" />
      <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>
  <style>
    <![CDATA[
    @keyframes shimmer {
      0% { transform: translateX(-400px); }
      100% { transform: translateX(400px); }
    }
    .div-shimmer { animation: shimmer 4s ease-in-out infinite; }
    ]]>
  </style>
  <rect x="50" y="5" width="750" height="2" rx="1" fill="url(#divGrad)" filter="url(#dg)" />
  <clipPath id="divClip"><rect x="50" y="3" width="750" height="6" /></clipPath>
  <g clip-path="url(#divClip)">
    <rect class="div-shimmer" x="-200" y="3" width="120" height="6" rx="3" fill="#ffffff" opacity="0.15" />
  </g>
</svg>
