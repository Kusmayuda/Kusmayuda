<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 6" width="100%" height="100%">
  <defs>
    <linearGradient id="dg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent" />
      <stop offset="15%" stop-color="#06b6d4" stop-opacity="0.6" />
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.8" />
      <stop offset="85%" stop-color="#ec4899" stop-opacity="0.6" />
      <stop offset="100%" stop-color="transparent" />
    </linearGradient>
  </defs>
  <style>
    <![CDATA[
    @keyframes shimmer {
      0% { transform: translateX(-600px); }
      100% { transform: translateX(600px); }
    }
    .sh { animation: shimmer 6s ease-in-out infinite; }
    ]]>
  </style>
  <rect x="100" y="2" width="650" height="1.5" rx="0.75" fill="url(#dg)" />
  <clipPath id="dc"><rect x="100" y="1" width="650" height="4" /></clipPath>
  <g clip-path="url(#dc)">
    <rect class="sh" x="-200" y="1" width="100" height="4" rx="2" fill="#ffffff" opacity="0.12" />
  </g>
</svg>
